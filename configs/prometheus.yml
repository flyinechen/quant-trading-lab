# Prometheus 配置文件
# 量化交易实验室监控系统

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  # FastAPI 应用监控
  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
  
  # 数据库监控
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
  
  - job_name: 'influxdb'
    static_configs:
      - targets: ['influxdb:8086']
  
  # Kafka 监控
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
  
  # Redis 监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

# 告警规则
rule_files:
  - "alerts.yml"

# 告警管理器
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
